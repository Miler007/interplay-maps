name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build shared package
        run: |
          cd packages/shared
          npm ci
          npm run build

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: https://interplay-maps.onrender.com/api/v1
        run: |
          cd apps/frontend
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 113d4fb1aef8c44b3a25eb2dbc3fef61
          workingDirectory: apps/frontend
          command: pages deploy out --project-name=interplay-maps --branch=main

      - name: Deploy Backend to Render
        run: curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
