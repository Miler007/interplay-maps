services:
  - type: web
    name: interplay-maps-backend
    runtime: docker
    repo: https://github.com/YOUR_ORG/interplay-maps
    dockerfilePath: apps/backend/Dockerfile
    branch: main
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: interplay-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://interplay-maps.pages.dev
      - key: PORT
        value: 4000
    healthCheckPath: /api/v1/dashboard
    autoDeploy: true

databases:
  - name: interplay-db
    databaseName: interplay_maps
    region: ohio
    plan: free
    postgresMajorVersion: 16
