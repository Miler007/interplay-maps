# fly.toml - Interplay Maps Backend (Fly.io)
app = "interplay-maps-backend"
primary_region = "gig" # nearest to Colombia

[build]
  dockerfile = "apps/backend/Dockerfile"

[env]
  PORT = "4000"
  FRONTEND_URL = "https://interplay-maps.pages.dev"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = true
  min_machines_running = 0
  processes = ["app"]

[[services]]
  protocol = "tcp"
  internal_port = 4000

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    hard_limit = 50
    soft_limit = 25
    type = "connections"
